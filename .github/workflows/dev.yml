name: Dev Deploy (Dry Run)

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/**/app.version.json'

jobs:
  detect:
    runs-on: ubuntu-latest

    outputs:
      apps: ${{ steps.set-output.outputs.apps }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed apps + read version
        id: set-output
        shell: bash
        run: |
          echo "=============================="
          echo "đź”Ť Detect changed apps"
          echo "=============================="

          FILES=$(git diff --name-only HEAD^ HEAD || true)

          echo "đź“„ Changed files:"
          echo "$FILES"

          APPS=$(echo "$FILES" \
            | grep 'apps/.*/app.version.json' \
            | cut -d/ -f2 \
            | sort -u)

          echo "đź“¦ Detected apps:"
          echo "$APPS"

          RESULT="[]"

          for app in $APPS; do
            VERSION_FILE="apps/$app/app.version.json"

            if [ ! -f "$VERSION_FILE" ]; then
              echo "âš ď¸Ź Missing $VERSION_FILE, skip"
              continue
            fi

            VERSION=$(cat "$VERSION_FILE" | jq -r '.version')

            echo "đź‘‰ App: $app"
            echo "   Version: $VERSION"

            RESULT=$(echo "$RESULT" | jq \
              --arg app "$app" \
              --arg version "$VERSION" \
              '. + [{"app": $app, "version": $version}]')
          done

          echo "=============================="
          echo "đź“¦ Final JSON:"
          echo "$RESULT"
          echo "=============================="

          echo "apps=$RESULT" >> $GITHUB_OUTPUT

  plan:
    needs: detect
    runs-on: ubuntu-latest

    steps:
      - name: Dry Run Deploy Plan
        shell: bash
        run: |
          echo "=============================="
          echo "đźš€ DRY RUN DEPLOY PLAN"
          echo "=============================="

          APPS='${{ needs.detect.outputs.apps }}'

          echo "đź“¦ Input:"
          echo "$APPS"

          echo "$APPS" | jq -c '.[]' | while read item; do
            APP=$(echo "$item" | jq -r '.app')
            VERSION=$(echo "$item" | jq -r '.version')

            IMAGE="${APP}:${VERSION}"
            CONTEXT="./apps/${APP}"
            DOCKERFILE="./apps/${APP}/Dockerfile"

            echo "----------------------------------"
            echo "APP       : $APP"
            echo "VERSION   : $VERSION"
            echo "IMAGE     : $IMAGE"
            echo "CONTEXT   : $CONTEXT"
            echo "DOCKERFILE: $DOCKERFILE"
            echo ""
            echo "đź‘‰ docker build -t $IMAGE -f $DOCKERFILE $CONTEXT"
            echo "----------------------------------"
          done

          echo "=============================="
          echo "âś… DONE"
          echo "=============================="
